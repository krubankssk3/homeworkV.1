<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>วิชา · ระบบส่งงานบ้านละลม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--green:#5E9A2D;--green-d:#2F5511;--green-l:#EFF4E4;--yellow:#F7C948;--yellow-d:#6B4D06;--bg:#F4F8EC;--ink:#33421C;--muted:#6E7B56;--line:#D2DEBC;--white:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600}
  .brand .lg{width:32px;height:32px;border-radius:50%;background:#fff;color:var(--green);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:15px;font-weight:700;flex:none}
  .brand .lg img{width:100%;height:100%;object-fit:contain}
  .user{display:flex;align-items:center;gap:9px;font-size:13px}
  .btn-logout{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:8px;padding:7px 11px;font-size:13px;font-family:inherit;cursor:pointer}
  .btn-logout:hover{background:rgba(255,255,255,.28)}
  nav.nav{background:#fff;border-bottom:0.5px solid var(--line);display:flex;gap:2px;padding:0 10px;overflow-x:auto;white-space:nowrap}
  nav.nav a{display:inline-flex;align-items:center;gap:6px;padding:12px 13px;font-size:13px;color:var(--muted);text-decoration:none;border-bottom:2.5px solid transparent}
  nav.nav a i{font-size:16px}
  nav.nav a:hover{color:var(--green-d)} nav.nav a.active{color:var(--green-d);font-weight:600;border-bottom-color:var(--green)}
  main{flex:1;width:100%;max-width:920px;margin:0 auto;padding:16px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  h1{font-size:19px;font-weight:600;color:var(--green-d)} .sub{font-size:13px;color:var(--muted);margin-top:2px}
  .btn{border:none;border-radius:9px;padding:10px 14px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:filter .15s,transform .05s}
  .btn:active{transform:scale(.99)} .btn:hover{filter:brightness(1.05)}
  .btn-green{background:var(--green);color:#fff} .btn-outline{background:#fff;color:var(--green-d);border:0.5px solid #BFD49A}
  .btn:disabled{opacity:.5;cursor:not-allowed;filter:none}
  .list{margin-top:16px;display:flex;flex-direction:column;gap:10px}
  .item{background:#fff;border:0.5px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}
  .item .body{flex:1;min-width:0}
  .item .t{font-size:15px;font-weight:600;color:var(--green-d)}
  .item .m{font-size:13px;color:var(--muted);margin-top:3px}
  .item .actions{display:flex;gap:8px}
  .mini{border:none;border-radius:8px;padding:7px 11px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
  .mini-out{background:#fff;color:var(--green-d);border:0.5px solid #BFD49A} .mini-del{background:#fff;color:#9B2C2C;border:0.5px solid #E3B7B7}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:30px 10px;background:#fff;border:0.5px dashed var(--line);border-radius:12px;margin-top:16px}
  .overlay{position:fixed;inset:0;background:rgba(33,50,17,.45);display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow:auto;z-index:20}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:440px;padding:20px;animation:rise .25s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .modal h2{font-size:17px;font-weight:600;color:var(--green-d)}
  label{display:block;font-size:13px;color:#3F5226;margin:12px 0 5px}
  input,select{width:100%;border:0.5px solid #CBD9B0;border-radius:9px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;height:40px}
  input:focus,select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(94,154,45,.2)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:10px;margin-top:18px}
  .modal-err{display:none;margin-top:12px;font-size:13px;background:#FBE2E2;color:#9B2C2C;border-radius:8px;padding:8px 11px}
  footer{margin-top:18px;padding:14px 16px;border-top:0.5px solid var(--line);background:var(--green-l);font-size:12px;color:var(--muted);text-align:center;line-height:1.7}
  footer b{color:var(--green-d);font-weight:600}

  @keyframes blrise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes blfade{from{opacity:0}to{opacity:1}}
  @media(prefers-reduced-motion:reduce){[data-bl-rev]{animation:none!important}}
</style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.21.0/tabler-icons.min.css">
</head>
<body>
  <header>
    <div class="brand"><span class="lg" id="logo">โล</span><span id="schoolName">บ้านละลม</span></div>
    <div class="user"><span id="userName">—</span><button class="btn-logout" id="logoutBtn"><i class="ti ti-logout" aria-hidden="true"></i> ออกจากระบบ</button></div>
  </header>
  <nav class="nav" id="nav"></nav>

  <main>
    <div class="top">
      <div><h1>วิชา</h1><div class="sub">จัดการวิชาที่สอน ผูกครูผู้สอนและห้องเรียน</div></div>
      <button class="btn btn-green" id="newBtn"><i class="ti ti-plus" aria-hidden="true"></i> เพิ่มวิชา</button>
    </div>
    <div class="list" id="list"></div>
    <div class="empty" id="emptyState">กำลังโหลด...</div>
  </main>

  <footer>ผู้พัฒนา: <b>นายชิติพัทธ์ นิลวรรณ</b><br>ครูโรงเรียนบ้านละลม สพป.ศรีสะเกษ เขต 3</footer>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">เพิ่มวิชา</h2>
      <label for="name">ชื่อวิชา</label><input id="name" type="text" placeholder="เช่น คณิตศาสตร์">
      <div id="teacherWrap" style="display:none"><label for="teacherSel">ครูผู้สอน</label><select id="teacherSel"></select></div>
      <div class="two">
        <div><label for="cls">ชั้น</label><input id="cls" type="text" placeholder="เช่น ป.6"></div>
        <div><label for="room">ห้อง</label><input id="room" type="text" placeholder="เช่น 1"></div>
      </div>
      <div class="modal-err" id="modalErr"></div>
      <div class="modal-actions">
        <button class="btn btn-green" id="saveBtn" style="flex:1">บันทึก</button>
        <button class="btn btn-outline" id="cancelBtn">ยกเลิก</button>
      </div>
    </div>
  </div>

<script>
  // ====== วาง URL /exec ของ Web App ที่ deploy จาก Code.gs ตรงนี้ ======
  const API_URL = 'https://script.google.com/macros/s/AKfycbwCTrn5F2tZ-UJiBazA1PA2np5Lwwhy_TYYie7liGg9LFIcaavqF78PLiPqaC3TwyXt/exec';

  const token = sessionStorage.getItem('bl_token');
  const session = JSON.parse(sessionStorage.getItem('bl_session') || 'null');
  if (!token || !session) { location.replace('login.html'); }

  async function api(action, payload) {
    const res = await fetch(API_URL, {
      method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action, token: token }, payload || {}))
    });
    return res.json();
  }
  const $ = function (id) { return document.getElementById(id); };
  const isAdmin = session && session.role === 'admin';

  const NAV = [
    { h: 'admin-dashboard.html', l: 'ภาพรวม', i: 'ti-chart-bar' }, { h: 'scan.html', l: 'สแกนรับงาน', i: 'ti-qrcode' },
    { h: 'assignments.html', l: 'งานที่มอบหมาย', i: 'ti-clipboard-list' }, { h: 'review.html', l: 'ตรวจงาน', i: 'ti-checkbox' }, { h: 'points.html', l: 'แต้มสะสม', i: 'ti-trophy' },
    { h: 'qrcard.html', l: 'สร้าง QR', i: 'ti-id-badge-2' }, { h: 'students.html', l: 'นักเรียน', i: 'ti-user' },
    { h: 'subjects.html', l: 'วิชา', i: 'ti-book' }, { h: 'teachers.html', l: 'ครูผู้สอน', i: 'ti-users', admin: true },
    { h: 'reports.html', l: 'รายงาน', i: 'ti-file-text' }, { h: 'settings.html', l: 'ตั้งค่า', i: 'ti-settings', admin: true }
  ];
  (function renderNav() {
    const role = (session && session.role) || 'teacher';
    NAV.forEach(function (it) {
      if (it.admin && role !== 'admin') return;
      const a = document.createElement('a'); a.href = it.h; a.innerHTML = '<i class="ti ' + it.i + '" aria-hidden="true"></i> ' + it.l;
      if (it.h === 'subjects.html') a.className = 'active';
      $('nav').appendChild(a);
    });
  })();
  if (session) $('userName').textContent = session.name || 'ผู้ใช้';

  $('logoutBtn').addEventListener('click', async function () {
    try { await api('logout'); } catch (e) {}
    sessionStorage.removeItem('bl_token'); sessionStorage.removeItem('bl_session');
    location.replace('login.html');
  });

  (async function () {
    try {
      const c = await api('getConfig');
      if (c && c.ok) {
        if (c.schoolName) $('schoolName').textContent = c.schoolName;
        if (c.logoUrl) { const img = document.createElement('img'); img.src = c.logoUrl; img.alt = ''; $('logo').textContent = ''; $('logo').appendChild(img); }
      }
    } catch (e) {}
  })();

  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }

  // โหลดรายชื่อครู (เฉพาะ admin เพื่อเลือกผู้สอน)
  let teachers = [];
  async function loadTeachers() {
    if (!isAdmin) return;
    try { const r = await api('listTeachers'); if (r && r.ok) teachers = r.teachers; } catch (e) {}
  }

  let subjects = [];
  async function loadSubjects() {
    $('emptyState').textContent = 'กำลังโหลด...'; $('emptyState').style.display = 'block';
    try {
      const r = await api('listSubjects');
      if (r && r.ok) { subjects = r.subjects; render(); }
    } catch (e) { $('emptyState').textContent = 'โหลดข้อมูลไม่สำเร็จ'; }
  }

  function teacherName(id) { const t = teachers.filter(function (x) { return x.teacherId === id; })[0]; return t ? t.name : id; }

  function render() {
    const list = $('list'); list.innerHTML = '';
    if (!subjects.length) { $('emptyState').textContent = 'ยังไม่มีวิชา กด "เพิ่มวิชา" เพื่อเริ่ม'; $('emptyState').style.display = 'block'; return; }
    $('emptyState').style.display = 'none';
    subjects.forEach(function (s) {
      const div = document.createElement('div'); div.className = 'item';
      div.innerHTML =
        '<div class="body"><div class="t">' + escapeHtml(s.name) + '</div>' +
        '<div class="m">' + escapeHtml(s.roomLabel) + (isAdmin ? ' · ครู: ' + escapeHtml(teacherName(s.teacherId)) : '') + '</div></div>' +
        '<div class="actions">' +
          '<button class="mini mini-out" data-edit="' + escapeHtml(s.subjectId) + '">แก้ไข</button>' +
          '<button class="mini mini-del" data-del="' + escapeHtml(s.subjectId) + '">ลบ</button>' +
        '</div>';
      div._data = s;
      list.appendChild(div);
    });
  }

  $('list').addEventListener('click', async function (e) {
    const ed = e.target.closest('button[data-edit]');
    const dl = e.target.closest('button[data-del]');
    if (ed) { openModal(ed.closest('.item')._data); }
    else if (dl) {
      const item = dl.closest('.item');
      if (!confirm('ลบวิชา "' + item._data.name + '" ?')) return;
      dl.disabled = true;
      try { const r = await api('deleteSubject', { subjectId: dl.getAttribute('data-del') }); if (r && r.ok) loadSubjects(); else dl.disabled = false; }
      catch (err) { dl.disabled = false; }
    }
  });

  // ---- Modal ----
  let editingId = null;
  $('newBtn').addEventListener('click', function () { openModal(null); });

  function fillTeacherSelect(selectedId) {
    if (!isAdmin) { $('teacherWrap').style.display = 'none'; return; }
    $('teacherWrap').style.display = 'block';
    const sel = $('teacherSel'); sel.innerHTML = '';
    teachers.filter(function (t) { return t.status === 'active'; }).forEach(function (t) {
      const o = document.createElement('option'); o.value = t.teacherId; o.textContent = t.name + ' (' + t.role + ')';
      if (t.teacherId === selectedId) o.selected = true;
      sel.appendChild(o);
    });
  }

  function openModal(s) {
    $('modalErr').style.display = 'none';
    if (s) {
      editingId = s.subjectId; $('modalTitle').textContent = 'แก้ไขวิชา';
      $('name').value = s.name || ''; $('cls').value = s.cls || ''; $('room').value = s.room || '';
      fillTeacherSelect(s.teacherId);
    } else {
      editingId = null; $('modalTitle').textContent = 'เพิ่มวิชา';
      $('name').value = ''; $('cls').value = ''; $('room').value = '';
      fillTeacherSelect(null);
    }
    $('overlay').classList.add('show');
  }
  function closeModal() { $('overlay').classList.remove('show'); }
  $('cancelBtn').addEventListener('click', closeModal);
  $('overlay').addEventListener('click', function (e) { if (e.target === $('overlay')) closeModal(); });

  $('saveBtn').addEventListener('click', async function () {
    const name = $('name').value.trim(), cls = $('cls').value.trim(), room = $('room').value.trim();
    if (!name || !cls || !room) { $('modalErr').textContent = 'กรอกชื่อวิชา ชั้น และห้องให้ครบ'; $('modalErr').style.display = 'block'; return; }
    const subject = { subjectId: editingId || undefined, name: name, cls: cls, room: room };
    if (isAdmin) subject.teacherId = $('teacherSel').value;
    $('saveBtn').disabled = true;
    try {
      const r = await api('saveSubject', { subject: subject });
      if (r && r.ok) { closeModal(); loadSubjects(); } else { $('modalErr').textContent = (r && r.error) || 'บันทึกไม่สำเร็จ'; $('modalErr').style.display = 'block'; }
    } catch (e) { $('modalErr').textContent = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'; $('modalErr').style.display = 'block'; }
    $('saveBtn').disabled = false;
  });

  (async function init() { await loadTeachers(); await loadSubjects(); })();
</script>

<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  function countUp(el){
    if(reduce || el.getAttribute('data-bl-done')) return;
    var m = String(el.textContent).trim().match(/^(\d+)(%?)$/);
    if(!m) return;
    var target = +m[1], suf = m[2];
    el.setAttribute('data-bl-done','1');
    if(target === 0){ el.textContent = '0'+suf; return; }
    var dur=850, start=performance.now();
    function tick(now){var p=Math.min(1,(now-start)/dur);var e=1-Math.pow(1-p,3);el.textContent=Math.round(target*e)+suf;if(p<1)requestAnimationFrame(tick);else el.textContent=target+suf;}
    requestAnimationFrame(tick);
  }
  function revealStagger(els, base, anim){
    if(reduce) return;
    var i=0;
    els.forEach(function(el){
      if(el.getAttribute('data-bl-rev')) return;
      el.setAttribute('data-bl-rev','1');
      el.style.animation=(anim||'blrise')+' .5s cubic-bezier(.22,.61,.36,1) both';
      el.style.animationDelay=((base||0)+Math.min(i,10)*0.045)+'s';
      i++;
    });
  }
  function sweep(){
    document.querySelectorAll('.chip b, .num').forEach(countUp);
    revealStagger([].slice.call(document.querySelectorAll('.metric, .chip')),0,'blrise');
    revealStagger([].slice.call(document.querySelectorAll('.card, .panel, .login-card')),0.05,'blrise');
    revealStagger([].slice.call(document.querySelectorAll('.item, .qrcard')),0.1,'blrise');
    revealStagger([].slice.call(document.querySelectorAll('#tbody tr, #rosterBody tr, .recent li')),0.04,'blfade');
  }
  function start(){
    sweep();
    var mo = new MutationObserver(function(){ sweep(); });
    mo.observe(document.body, {childList:true, subtree:true});
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', start); else start();
})();
</script>
</body>
</html>
