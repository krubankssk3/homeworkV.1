<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แต้มสะสม · ระบบส่งงานบ้านละลม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.21.0/tabler-icons.min.css">
<style>
  :root{--green:#5E9A2D;--green-d:#2F5511;--green-l:#EFF4E4;--yellow:#F7C948;--yellow-d:#6B4D06;--bg:#F4F8EC;--ink:#33421C;--muted:#6E7B56;--line:#D2DEBC;--white:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600}
  .brand .lg{width:32px;height:32px;border-radius:50%;background:#fff;color:var(--green);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:15px;font-weight:700;flex:none}
  .brand .lg img{width:100%;height:100%;object-fit:contain}
  .user{display:flex;align-items:center;gap:9px;font-size:13px}
  .btn-logout{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:8px;padding:7px 11px;font-size:13px;font-family:inherit;cursor:pointer}
  .btn-logout:hover{background:rgba(255,255,255,.28)}
  nav.nav{background:#fff;border-bottom:0.5px solid var(--line);display:flex;gap:2px;padding:0 10px;overflow-x:auto;white-space:nowrap}
  nav.nav a{display:inline-flex;align-items:center;gap:6px;padding:12px 13px;font-size:13px;color:var(--muted);text-decoration:none;border-bottom:2.5px solid transparent}
  nav.nav a i{font-size:16px}
  nav.nav a:hover{color:var(--green-d)} nav.nav a.active{color:var(--green-d);font-weight:600;border-bottom-color:var(--green)}
  main{flex:1;width:100%;max-width:880px;margin:0 auto;padding:16px}
  h1{font-size:19px;font-weight:600;color:var(--green-d)} .sub{font-size:13px;color:var(--muted);margin-top:2px}
  .toolbar{margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  select{height:42px;border:0.5px solid #CBD9B0;border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(94,154,45,.2)}
  .config-note{font-size:12px;color:var(--muted);margin-left:auto;display:flex;align-items:center;gap:6px}
  .podium{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
  @media(max-width:560px){.podium{grid-template-columns:1fr}}
  .pcard{background:#fff;border:0.5px solid var(--line);border-radius:14px;padding:16px;text-align:center;position:relative;overflow:hidden}
  .pcard .medal{font-size:26px}
  .pcard.r1{border-color:#E7C200;background:linear-gradient(180deg,#FFFBEC,#fff)}
  .pcard.r2{border-color:#B9C2CC;background:linear-gradient(180deg,#F7F9FB,#fff)}
  .pcard.r3{border-color:#D7A87A;background:linear-gradient(180deg,#FBF3EC,#fff)}
  .pcard .nm{font-size:14px;font-weight:600;color:var(--green-d);margin-top:6px}
  .pcard .rm{font-size:12px;color:var(--muted)}
  .pcard .pts{font-size:24px;font-weight:700;color:var(--green-d);margin-top:6px}
  .pcard .pts span{font-size:13px;font-weight:400;color:var(--muted)}
  .panel{background:#fff;border:0.5px solid var(--line);border-radius:14px;margin-top:14px;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:560px}
  th,td{text-align:left;padding:11px 14px;border-bottom:0.5px solid #EDF1E2}
  th{color:var(--muted);font-weight:600;font-size:12px;background:#FAFCF4} tr:last-child td{border-bottom:none}
  .rank{font-weight:700;color:var(--green-d);width:30px;text-align:center}
  .ptcell{font-weight:600;color:var(--green-d)}
  .mini{font-size:12px;color:var(--muted)}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:30px 10px}
  .link-name{color:var(--green-d);text-decoration:none;border-bottom:1px dotted #BFD49A}
  .link-name:hover{color:var(--green)}
  footer{margin-top:18px;padding:14px 16px;border-top:0.5px solid var(--line);background:var(--green-l);font-size:12px;color:var(--muted);text-align:center;line-height:1.7}
  footer b{color:var(--green-d);font-weight:600}
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="lg" id="logo">โล</span><span id="schoolName">บ้านละลม</span></div>
    <div class="user"><span id="userName">—</span><button class="btn-logout" id="logoutBtn"><i class="ti ti-logout" aria-hidden="true"></i> ออกจากระบบ</button></div>
  </header>
  <nav class="nav" id="nav"></nav>

  <main>
    <h1>แต้มสะสม / จัดอันดับ</h1>
    <div class="sub">แต้มคำนวณจากการส่งงาน — ส่งตรงเวลาได้แต้มเต็ม ส่งสายได้แต้มน้อยกว่า ตรวจแล้วได้โบนัส</div>

    <div class="toolbar">
      <select id="subjectSel"><option value="">ทุกวิชาที่สอน</option></select>
      <select id="roomSel"><option value="">ทุกห้อง</option></select>
      <span class="config-note" id="configNote"></span>
    </div>

    <div class="podium" id="podium" style="display:none"></div>

    <div class="panel">
      <table>
        <thead><tr><th class="rank">#</th><th>ชื่อ-สกุล</th><th style="width:80px">ห้อง</th><th style="width:90px">แต้มรวม</th><th style="width:160px">รายละเอียด</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="emptyState">กำลังโหลด...</div>
    </div>
  </main>

  <footer>ผู้พัฒนา: <b>นายชิติพัทธ์ นิลวรรณ</b><br>ครูโรงเรียนบ้านละลม สพป.ศรีสะเกษ เขต 3</footer>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwCTrn5F2tZ-UJiBazA1PA2np5Lwwhy_TYYie7liGg9LFIcaavqF78PLiPqaC3TwyXt/exec';

  const token = sessionStorage.getItem('bl_token');
  const session = JSON.parse(sessionStorage.getItem('bl_session') || 'null');
  if (!token || !session) { location.replace('login.html'); }

  async function api(action, payload) {
    const res = await fetch(API_URL, {
      method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action, token: token }, payload || {}))
    });
    return res.json();
  }
  const $ = function (id) { return document.getElementById(id); };
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }

  const NAV = [
    { h: 'admin-dashboard.html', l: 'ภาพรวม', i: 'ti-chart-bar' }, { h: 'scan.html', l: 'สแกนรับงาน', i: 'ti-qrcode' },
    { h: 'assignments.html', l: 'งานที่มอบหมาย', i: 'ti-clipboard-list' }, { h: 'review.html', l: 'ตรวจงาน', i: 'ti-checkbox' },
    { h: 'points.html', l: 'แต้มสะสม', i: 'ti-trophy' }, { h: 'qrcard.html', l: 'สร้าง QR', i: 'ti-id-badge-2' },
    { h: 'students.html', l: 'นักเรียน', i: 'ti-user' }, { h: 'subjects.html', l: 'วิชา', i: 'ti-book' },
    { h: 'teachers.html', l: 'ครูผู้สอน', i: 'ti-users', admin: true }, { h: 'reports.html', l: 'รายงาน', i: 'ti-file-text' },
    { h: 'settings.html', l: 'ตั้งค่า', i: 'ti-settings', admin: true }
  ];
  (function renderNav() {
    const role = (session && session.role) || 'teacher';
    NAV.forEach(function (it) {
      if (it.admin && role !== 'admin') return;
      const a = document.createElement('a'); a.href = it.h;
      a.innerHTML = '<i class="ti ' + it.i + '" aria-hidden="true"></i> ' + it.l;
      if (it.h === 'points.html') a.className = 'active';
      $('nav').appendChild(a);
    });
  })();
  if (session) $('userName').textContent = session.name || 'ผู้ใช้';

  $('logoutBtn').addEventListener('click', async function () {
    try { await api('logout'); } catch (e) {}
    sessionStorage.removeItem('bl_token'); sessionStorage.removeItem('bl_session');
    location.replace('login.html');
  });

  (async function () {
    try {
      const c = await api('getConfig');
      if (c && c.ok) {
        if (c.schoolName) $('schoolName').textContent = c.schoolName;
        if (c.logoUrl) { const img = document.createElement('img'); img.src = c.logoUrl; img.alt = ''; $('logo').textContent = ''; $('logo').appendChild(img); }
      }
    } catch (e) {}
  })();

  // โหลดวิชา + ห้องสำหรับตัวกรอง
  let subjects = [];
  (async function loadSubjects() {
    try {
      const r = await api('listSubjects');
      if (r && r.ok) {
        subjects = r.subjects;
        const rooms = {};
        subjects.forEach(function (s) {
          const o = document.createElement('option'); o.value = s.subjectId; o.textContent = s.name + ' · ' + s.roomLabel;
          $('subjectSel').appendChild(o);
          rooms[s.roomLabel] = true;
        });
        Object.keys(rooms).sort().forEach(function (rl) {
          const o = document.createElement('option'); o.value = rl; o.textContent = 'ห้อง ' + rl; $('roomSel').appendChild(o);
        });
      }
    } catch (e) {}
    load();
  })();

  $('subjectSel').addEventListener('change', load);
  $('roomSel').addEventListener('change', load);

  async function load() {
    $('emptyState').textContent = 'กำลังโหลด...'; $('emptyState').style.display = 'block';
    $('tbody').innerHTML = ''; $('podium').style.display = 'none';
    const filters = {};
    if ($('subjectSel').value) filters.subjectId = $('subjectSel').value;
    if ($('roomSel').value) filters.roomLabel = $('roomSel').value;
    try {
      const r = await api('getPoints', { filters: filters });
      if (!r || !r.ok) { $('emptyState').textContent = (r && r.error) || 'โหลดข้อมูลไม่สำเร็จ'; return; }
      if (r.config) $('configNote').innerHTML = '<i class="ti ti-info-circle"></i> ตรงเวลา ' + r.config.onTime + ' · สาย ' + r.config.late + ' · โบนัสตรวจแล้ว ' + r.config.reviewedBonus + ' แต้ม';
      render(r.ranking || []);
    } catch (e) { $('emptyState').textContent = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'; }
  }

  function render(ranking) {
    if (!ranking.length) { $('emptyState').textContent = 'ยังไม่มีข้อมูลแต้ม (ยังไม่มีการส่งงาน)'; $('emptyState').style.display = 'block'; $('podium').style.display = 'none'; return; }
    $('emptyState').style.display = 'none';

    // แท่นท็อป 3
    const medals = ['🥇', '🥈', '🥉'];
    const top = ranking.slice(0, 3);
    $('podium').style.display = 'grid';
    $('podium').innerHTML = top.map(function (r, i) {
      return '<div class="pcard r' + (i + 1) + '"><div class="medal">' + medals[i] + '</div>' +
        '<div class="nm"><a class="link-name" href="scores.html?id=' + encodeURIComponent(r.studentId) + '">' + escapeHtml(r.name) + '</a></div>' +
        '<div class="rm">เลขที่ ' + escapeHtml(r.seatNo) + ' · ' + escapeHtml(r.roomLabel) + '</div>' +
        '<div class="pts">' + r.points + ' <span>แต้ม</span></div></div>';
    }).join('');

    const body = $('tbody'); body.innerHTML = '';
    ranking.forEach(function (r) {
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="rank">' + r.rank + '</td>' +
        '<td><a class="link-name" href="scores.html?id=' + encodeURIComponent(r.studentId) + '">' + escapeHtml(r.name) + '</a> <span class="mini">เลขที่ ' + escapeHtml(r.seatNo) + '</span></td>' +
        '<td>' + escapeHtml(r.roomLabel) + '</td>' +
        '<td class="ptcell">' + r.points + '</td>' +
        '<td class="mini">ตรงเวลา ' + r.onTime + ' · สาย ' + r.late + ' · ตรวจแล้ว ' + r.reviewed + '</td>';
      body.appendChild(tr);
    });
  }
</script>
</body>
</html>
