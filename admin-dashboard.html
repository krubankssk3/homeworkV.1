<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ภาพรวมระบบ · ระบบส่งงานบ้านละลม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.21.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{--green:#5E9A2D;--green-d:#2F5511;--green-l:#EFF4E4;--yellow:#F7C948;--yellow-d:#6B4D06;--grey:#B4B2A9;--bg:#F4F8EC;--ink:#33421C;--muted:#6E7B56;--line:#D2DEBC;--white:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600}
  .brand .lg{width:32px;height:32px;border-radius:50%;background:#fff;color:var(--green);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:15px;font-weight:700;flex:none}
  .brand .lg img{width:100%;height:100%;object-fit:contain}
  .user{display:flex;align-items:center;gap:9px;font-size:13px}
  .btn-logout{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:8px;padding:7px 11px;font-size:13px;font-family:inherit;cursor:pointer}
  .btn-logout:hover{background:rgba(255,255,255,.28)}
  nav.nav{background:#fff;border-bottom:0.5px solid var(--line);display:flex;gap:2px;padding:0 10px;overflow-x:auto;white-space:nowrap}
  nav.nav a{display:inline-flex;align-items:center;gap:6px;padding:12px 13px;font-size:13px;color:var(--muted);text-decoration:none;border-bottom:2.5px solid transparent}
  nav.nav a i{font-size:16px}
  nav.nav a:hover{color:var(--green-d)} nav.nav a.active{color:var(--green-d);font-weight:600;border-bottom-color:var(--green)}
  main{flex:1;width:100%;max-width:1000px;margin:0 auto;padding:18px}
  h1{font-size:21px;font-weight:600;color:var(--green-d)} .sub{font-size:13px;color:var(--muted);margin-top:2px}
  @keyframes blrise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .reveal{animation:blrise .5s cubic-bezier(.22,.61,.36,1) both}
  @media(prefers-reduced-motion:reduce){.reveal{animation:none}}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
  @media(max-width:640px){.grid4{grid-template-columns:repeat(2,1fr)}}
  .metric{background:#fff;border:0.5px solid var(--line);border-radius:12px;padding:14px 16px}
  .metric .lab{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .metric .num{font-size:26px;font-weight:600;color:var(--green-d);margin-top:3px}
  .card{background:#fff;border:0.5px solid var(--line);border-radius:14px;padding:16px 18px;margin-top:14px}
  .ctitle{font-size:14px;font-weight:600;color:var(--green-d);margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .cnote{font-size:12px;color:var(--muted);margin-bottom:10px}
  .charts{display:grid;grid-template-columns:3fr 2fr;gap:18px}
  @media(max-width:720px){.charts{grid-template-columns:1fr}}
  .chartwrap{position:relative;height:240px}
  .forecast{display:flex;align-items:center;gap:12px;background:var(--green-l);border-radius:12px;padding:14px 16px;margin-top:4px}
  .forecast .big{font-size:30px;font-weight:700;color:var(--green-d)}
  .forecast .txt{font-size:13px;color:var(--muted)}
  .forecast .ic{font-size:30px;color:var(--green)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:10px 12px;border-bottom:0.5px solid #EDF1E2}
  th{color:var(--muted);font-weight:600;font-size:12px} tr:last-child td{border-bottom:none}
  .track{height:8px;border-radius:5px;background:#EAEFE0;overflow:hidden;margin-top:5px}
  .fill{height:100%;background:var(--green);border-radius:5px;width:0;transition:width .8s cubic-bezier(.22,.61,.36,1)}
  .ratecell{font-weight:600;color:var(--green-d);width:54px}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:24px 10px}
  .loading{color:var(--muted);font-size:14px;text-align:center;padding:40px 10px}
  footer{margin-top:20px;padding:16px;border-top:0.5px solid var(--line);background:var(--green-l);font-size:12px;color:var(--muted);text-align:center;line-height:1.7}
  footer b{color:var(--green-d);font-weight:600}
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="lg" id="logo">โล</span><span id="schoolName">บ้านละลม</span></div>
    <div class="user"><span id="userName">—</span><button class="btn-logout" id="logoutBtn"><i class="ti ti-logout" aria-hidden="true"></i> ออกจากระบบ</button></div>
  </header>
  <nav class="nav" id="nav"></nav>

  <main>
    <h1>ภาพรวมระบบ</h1>
    <div class="sub">สรุปการส่งงานทั้งหมดในความรับผิดชอบของคุณ</div>
    <div id="content"><div class="loading">กำลังโหลดข้อมูล...</div></div>
  </main>

  <footer>ผู้พัฒนา: <b>นายชิติพัทธ์ นิลวรรณ</b><br>ครูโรงเรียนบ้านละลม สพป.ศรีสะเกษ เขต 3</footer>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwCTrn5F2tZ-UJiBazA1PA2np5Lwwhy_TYYie7liGg9LFIcaavqF78PLiPqaC3TwyXt/exec';

  const token = sessionStorage.getItem('bl_token');
  const session = JSON.parse(sessionStorage.getItem('bl_session') || 'null');
  if (!token || !session) { location.replace('login.html'); }

  async function api(action, payload) {
    const res = await fetch(API_URL, {
      method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action, token: token }, payload || {}))
    });
    return res.json();
  }
  const $ = function (id) { return document.getElementById(id); };
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
  function cssVar(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

  const NAV = [
    { h: 'admin-dashboard.html', l: 'ภาพรวม', i: 'ti-chart-bar' }, { h: 'scan.html', l: 'สแกนรับงาน', i: 'ti-qrcode' },
    { h: 'assignments.html', l: 'งานที่มอบหมาย', i: 'ti-clipboard-list' }, { h: 'review.html', l: 'ตรวจงาน', i: 'ti-checkbox' },
    { h: 'points.html', l: 'แต้มสะสม', i: 'ti-trophy' }, { h: 'qrcard.html', l: 'สร้าง QR', i: 'ti-id-badge-2' },
    { h: 'students.html', l: 'นักเรียน', i: 'ti-user' }, { h: 'subjects.html', l: 'วิชา', i: 'ti-book' },
    { h: 'teachers.html', l: 'ครูผู้สอน', i: 'ti-users', admin: true }, { h: 'reports.html', l: 'รายงาน', i: 'ti-file-text' },
    { h: 'settings.html', l: 'ตั้งค่า', i: 'ti-settings', admin: true }
  ];
  (function renderNav() {
    const role = (session && session.role) || 'teacher';
    NAV.forEach(function (it) {
      if (it.admin && role !== 'admin') return;
      const a = document.createElement('a'); a.href = it.h;
      a.innerHTML = '<i class="ti ' + it.i + '" aria-hidden="true"></i> ' + it.l;
      if (it.h === 'admin-dashboard.html') a.className = 'active';
      $('nav').appendChild(a);
    });
  })();
  if (session) $('userName').textContent = session.name || 'ผู้ใช้';

  $('logoutBtn').addEventListener('click', async function () {
    try { await api('logout'); } catch (e) {}
    sessionStorage.removeItem('bl_token'); sessionStorage.removeItem('bl_session');
    location.replace('login.html');
  });

  (async function () {
    try {
      const c = await api('getConfig');
      if (c && c.ok) {
        if (c.schoolName) $('schoolName').textContent = c.schoolName;
        if (c.logoUrl) { const img = document.createElement('img'); img.src = c.logoUrl; img.alt = ''; $('logo').textContent = ''; $('logo').appendChild(img); }
      }
    } catch (e) {}
  })();

  let trendChart = null;

  (async function load() {
    try {
      const r = await api('getAdminDashboard', {});
      if (!r || !r.ok) { $('content').innerHTML = '<div class="empty">' + ((r && r.error) || 'โหลดข้อมูลไม่สำเร็จ') + '</div>'; return; }
      renderDashboard(r);
    } catch (e) { $('content').innerHTML = '<div class="empty">เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ ตรวจสอบ API_URL</div>'; }
  })();

  function renderDashboard(d) {
    const o = d.overall || {};
    const forecastTxt = (d.forecast != null)
      ? '<div class="forecast reveal" style="animation-delay:.1s"><i class="ti ti-trending-up ic"></i><div><div class="big">' + d.forecast + '%</div><div class="txt">แนวโน้มอัตราการส่งที่คาดว่าจะเป็น (ประมาณการจากค่าเฉลี่ยช่วงหลัง — ไม่ใช่การทำนายแน่นอน)</div></div></div>'
      : '<div class="forecast reveal"><i class="ti ti-info-circle ic"></i><div class="txt">ยังมีข้อมูลไม่พอสำหรับประมาณการแนวโน้ม</div></div>';

    $('content').innerHTML =
      '<div class="grid4">' +
        metric('ti-clipboard-list', 'งานทั้งหมด', o.assignments || 0, 'var(--green-d)', 0) +
        metric('ti-circle-check', 'อัตราการส่งรวม', (o.rate || 0), 'var(--green-d)', 1, '%') +
        metric('ti-clock-hour-4', 'ส่งสาย', o.late || 0, 'var(--yellow-d)', 2) +
        metric('ti-alert-circle', 'ยังไม่ส่ง', o.pending || 0, '#5F5E5A', 3) +
      '</div>' +
      '<div class="card reveal" style="animation-delay:.16s"><div class="ctitle"><i class="ti ti-chart-line"></i> แนวโน้มอัตราการส่ง</div>' +
        '<div class="cnote">รายสัปดาห์ย้อนหลัง 8 สัปดาห์ (%)</div>' +
        '<div class="charts">' +
          '<div class="chartwrap"><canvas id="trend"></canvas></div>' +
          '<div>' + forecastTxt +
            '<div style="margin-top:12px;font-size:13px;color:var(--muted);line-height:1.8">' +
              '<div><b style="color:var(--green-d)">ส่งตรงเวลา:</b> ' + (o.onTime || 0) + ' ครั้ง</div>' +
              '<div><b style="color:var(--yellow-d)">ส่งสาย:</b> ' + (o.late || 0) + ' ครั้ง</div>' +
              '<div><b style="color:var(--green-d)">ตรวจแล้ว:</b> ' + (o.reviewed || 0) + ' ครั้ง</div>' +
              '<div><b>คาดหวังส่งทั้งหมด:</b> ' + (o.expected || 0) + ' ครั้ง</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card reveal" style="animation-delay:.22s"><div class="ctitle"><i class="ti ti-list-details"></i> สรุปแยกตามวิชา/ห้อง</div><div id="subjTable"></div></div>';

    runCountUps();
    renderSubjects(d.subjectSummary || []);
    drawTrend(d.trend || []);
  }

  function metric(icon, lab, num, color, idx, suffix) {
    return '<div class="metric reveal" style="animation-delay:' + (idx * 0.05) + 's">' +
      '<div class="lab"><i class="ti ' + icon + '"></i> ' + lab + '</div>' +
      '<div class="num" style="color:' + color + '" data-target="' + num + '" data-suffix="' + (suffix || '') + '">0' + (suffix || '') + '</div></div>';
  }

  function runCountUps() {
    document.querySelectorAll('.num[data-target]').forEach(function (el) {
      const target = Number(el.getAttribute('data-target')) || 0;
      const suffix = el.getAttribute('data-suffix') || '';
      if (target === 0) { el.textContent = '0' + suffix; return; }
      const dur = 850, start = performance.now();
      function tick(now) { const p = Math.min(1, (now - start) / dur); const e = 1 - Math.pow(1 - p, 3); el.textContent = Math.round(target * e) + suffix; if (p < 1) requestAnimationFrame(tick); else el.textContent = target + suffix; }
      requestAnimationFrame(tick);
    });
  }

  function renderSubjects(list) {
    const box = $('subjTable');
    if (!list.length) { box.innerHTML = '<div class="empty">ยังไม่มีข้อมูลงาน</div>'; return; }
    let html = '<table><thead><tr><th>วิชา</th><th style="width:80px">ห้อง</th><th style="width:70px">งาน</th><th style="width:160px">อัตราการส่ง</th></tr></thead><tbody>';
    list.forEach(function (b, i) {
      html += '<tr><td>' + escapeHtml(b.subjectName) + '</td><td>' + escapeHtml(b.roomLabel) + '</td><td>' + b.assignments + '</td>' +
        '<td><div style="display:flex;align-items:center;gap:8px"><span class="ratecell">' + b.rate + '%</span>' +
        '<div class="track" style="flex:1"><div class="fill" data-w="' + b.rate + '"></div></div></div></td></tr>';
    });
    html += '</tbody></table>';
    box.innerHTML = html;
    // วิ่งแถบหลัง render
    setTimeout(function () {
      box.querySelectorAll('.fill').forEach(function (f, i) {
        setTimeout(function () { f.style.width = f.getAttribute('data-w') + '%'; }, i * 60);
      });
    }, 200);
  }

  function drawTrend(trend) {
    if (typeof Chart === 'undefined') return;
    const ctx = $('trend'); if (!ctx) return;
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: trend.map(function (t) { return t.label; }),
        datasets: [{
          data: trend.map(function (t) { return t.percent; }),
          borderColor: cssVar('--green'), backgroundColor: 'rgba(94,154,45,.12)',
          fill: true, tension: .35, pointRadius: 4, pointBackgroundColor: cssVar('--green'), borderWidth: 2.5
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, max: 100, ticks: { callback: function (v) { return v + '%'; } }, grid: { color: '#EDF1E2' } }, x: { grid: { display: false } } },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (c) { return 'อัตราการส่ง ' + c.parsed.y + '%'; } } } }
      }
    });
  }
</script>
</body>
</html>
