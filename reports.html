<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงาน · ระบบส่งงานบ้านละลม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--green:#5E9A2D;--green-d:#2F5511;--green-l:#EFF4E4;--yellow:#F7C948;--yellow-d:#6B4D06;--bg:#F4F8EC;--ink:#33421C;--muted:#6E7B56;--line:#D2DEBC;--white:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600}
  .brand .lg{width:32px;height:32px;border-radius:50%;background:#fff;color:var(--green);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:15px;font-weight:700;flex:none}
  .brand .lg img{width:100%;height:100%;object-fit:contain}
  .user{display:flex;align-items:center;gap:9px;font-size:13px}
  .btn-logout{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:8px;padding:7px 11px;font-size:13px;font-family:inherit;cursor:pointer}
  .btn-logout:hover{background:rgba(255,255,255,.28)}
  nav.nav{background:#fff;border-bottom:0.5px solid var(--line);display:flex;gap:2px;padding:0 10px;overflow-x:auto;white-space:nowrap}
  nav.nav a{display:inline-flex;align-items:center;gap:6px;padding:12px 13px;font-size:13px;color:var(--muted);text-decoration:none;border-bottom:2.5px solid transparent}
  nav.nav a i{font-size:16px}
  nav.nav a:hover{color:var(--green-d)} nav.nav a.active{color:var(--green-d);font-weight:600;border-bottom-color:var(--green)}
  main{flex:1;width:100%;max-width:1000px;margin:0 auto;padding:16px}
  h1{font-size:19px;font-weight:600;color:var(--green-d)} .sub{font-size:13px;color:var(--muted);margin-top:2px}
  .toolbar{margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  select{height:42px;border:0.5px solid #CBD9B0;border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(94,154,45,.2)}
  .btn{border:none;border-radius:9px;padding:10px 14px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:filter .15s,transform .05s}
  .btn:active{transform:scale(.99)} .btn:hover{filter:brightness(1.05)}
  .btn-green{background:var(--green);color:#fff} .btn-yellow{background:var(--yellow);color:var(--yellow-d)} .btn-outline{background:#fff;color:var(--green-d);border:0.5px solid #BFD49A}
  .btn:disabled{opacity:.5;cursor:not-allowed;filter:none}
  .summary{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .chip{background:#fff;border:0.5px solid var(--line);border-radius:10px;padding:8px 14px;font-size:13px;color:var(--muted)}
  .chip b{display:block;font-size:18px;color:var(--green-d);font-weight:600}
  .panel{background:#fff;border:0.5px solid var(--line);border-radius:14px;margin-top:14px;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px}
  th,td{text-align:left;padding:10px 12px;border-bottom:0.5px solid #EDF1E2}
  th{color:var(--muted);font-weight:600;font-size:12px;background:#FAFCF4} tr:last-child td{border-bottom:none}
  .pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap}
  .p-ok{background:#DCEFC4;color:var(--green-d)} .p-late{background:#FBE6BD;color:var(--yellow-d)} .p-ck{background:#CFE8AE;color:var(--green-d)}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:30px 10px}
  .rtitle{display:none}
  footer{margin-top:18px;padding:14px 16px;border-top:0.5px solid var(--line);background:var(--green-l);font-size:12px;color:var(--muted);text-align:center;line-height:1.7}
  footer b{color:var(--green-d);font-weight:600}
  @media print{
    header,nav.nav,.toolbar,.btn,footer{display:none!important}
    body{background:#fff} main{padding:0;max-width:none}
    .rtitle{display:block;font-size:18px;font-weight:600;color:#000;margin-bottom:4px}
    .panel{border:none;box-shadow:none} table{min-width:0;font-size:12px}
    th{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pill{border:1px solid #999}
  }

  @keyframes blrise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes blfade{from{opacity:0}to{opacity:1}}
  @media(prefers-reduced-motion:reduce){[data-bl-rev]{animation:none!important}}
</style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.21.0/tabler-icons.min.css">
</head>
<body>
  <header>
    <div class="brand"><span class="lg" id="logo">โล</span><span id="schoolName">บ้านละลม</span></div>
    <div class="user"><span id="userName">—</span><button class="btn-logout" id="logoutBtn"><i class="ti ti-logout" aria-hidden="true"></i> ออกจากระบบ</button></div>
  </header>
  <nav class="nav" id="nav"></nav>

  <main>
    <h1>รายงานการส่งงาน</h1>
    <div class="sub">กรองตามวิชาหรืองาน แล้วส่งออกเป็น Excel (CSV) หรือพิมพ์เป็น PDF</div>

    <div class="toolbar">
      <select id="subjectSel"><option value="">ทุกวิชา</option></select>
      <select id="assignmentSel"><option value="">ทุกงานในวิชา</option></select>
      <span style="flex:1"></span>
      <button class="btn btn-outline" id="csvBtn" disabled><i class="ti ti-file-spreadsheet" aria-hidden="true"></i> ส่งออก Excel</button>
      <button class="btn btn-yellow" id="printBtn" disabled><i class="ti ti-printer" aria-hidden="true"></i> พิมพ์ PDF</button>
    </div>

    <div class="summary" id="summary" style="display:none"></div>

    <div class="rtitle" id="printTitle"></div>
    <div class="panel">
      <table>
        <thead><tr><th>วิชา</th><th>ห้อง</th><th>งาน</th><th>เลขที่</th><th>ชื่อ-สกุล</th><th>เวลาที่ส่ง</th><th>ความตรงเวลา</th><th>สถานะ</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="emptyState">กำลังโหลด...</div>
    </div>
  </main>

  <footer>ผู้พัฒนา: <b>นายชิติพัทธ์ นิลวรรณ</b><br>ครูโรงเรียนบ้านละลม สพป.ศรีสะเกษ เขต 3</footer>

<script>
  // ====== วาง URL /exec ของ Web App ที่ deploy จาก Code.gs ตรงนี้ ======
  const API_URL = 'https://script.google.com/macros/s/AKfycbwCTrn5F2tZ-UJiBazA1PA2np5Lwwhy_TYYie7liGg9LFIcaavqF78PLiPqaC3TwyXt/exec';

  const token = sessionStorage.getItem('bl_token');
  const session = JSON.parse(sessionStorage.getItem('bl_session') || 'null');
  if (!token || !session) { location.replace('login.html'); }

  async function api(action, payload) {
    const res = await fetch(API_URL, {
      method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action, token: token }, payload || {}))
    });
    return res.json();
  }
  const $ = function (id) { return document.getElementById(id); };
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }

  const NAV = [
    { h: 'admin-dashboard.html', l: 'ภาพรวม', i: 'ti-chart-bar' }, { h: 'scan.html', l: 'สแกนรับงาน', i: 'ti-qrcode' },
    { h: 'assignments.html', l: 'งานที่มอบหมาย', i: 'ti-clipboard-list' }, { h: 'review.html', l: 'ตรวจงาน', i: 'ti-checkbox' }, { h: 'points.html', l: 'แต้มสะสม', i: 'ti-trophy' },
    { h: 'qrcard.html', l: 'สร้าง QR', i: 'ti-id-badge-2' }, { h: 'students.html', l: 'นักเรียน', i: 'ti-user' },
    { h: 'subjects.html', l: 'วิชา', i: 'ti-book' }, { h: 'teachers.html', l: 'ครูผู้สอน', i: 'ti-users', admin: true },
    { h: 'reports.html', l: 'รายงาน', i: 'ti-file-text' }, { h: 'settings.html', l: 'ตั้งค่า', i: 'ti-settings', admin: true }
  ];
  (function renderNav() {
    const role = (session && session.role) || 'teacher';
    NAV.forEach(function (it) {
      if (it.admin && role !== 'admin') return;
      const a = document.createElement('a'); a.href = it.h; a.innerHTML = '<i class="ti ' + it.i + '" aria-hidden="true"></i> ' + it.l;
      if (it.h === 'reports.html') a.className = 'active';
      $('nav').appendChild(a);
    });
  })();
  if (session) $('userName').textContent = session.name || 'ผู้ใช้';

  $('logoutBtn').addEventListener('click', async function () {
    try { await api('logout'); } catch (e) {}
    sessionStorage.removeItem('bl_token'); sessionStorage.removeItem('bl_session');
    location.replace('login.html');
  });

  let schoolName = 'โรงเรียนบ้านละลม';
  (async function () {
    try {
      const c = await api('getConfig');
      if (c && c.ok) {
        if (c.schoolName) { schoolName = c.schoolName; $('schoolName').textContent = c.schoolName; }
        if (c.logoUrl) { const img = document.createElement('img'); img.src = c.logoUrl; img.alt = ''; $('logo').textContent = ''; $('logo').appendChild(img); }
      }
    } catch (e) {}
  })();

  let subjects = [];
  (async function loadSubjects() {
    try {
      const r = await api('listSubjects');
      if (r && r.ok) {
        subjects = r.subjects;
        subjects.forEach(function (s) { const o = document.createElement('option'); o.value = s.subjectId; o.textContent = s.name + ' · ' + s.roomLabel; $('subjectSel').appendChild(o); });
      }
    } catch (e) {}
    loadReport();
  })();

  $('subjectSel').addEventListener('change', async function () {
    const sel = $('assignmentSel'); sel.innerHTML = '<option value="">ทุกงานในวิชา</option>';
    if (this.value) {
      try {
        const r = await api('listAssignments', { filters: { subjectId: this.value } });
        if (r && r.ok) r.assignments.forEach(function (a) { const o = document.createElement('option'); o.value = a.assignmentId; o.textContent = a.title; sel.appendChild(o); });
      } catch (e) {}
    }
    loadReport();
  });
  $('assignmentSel').addEventListener('change', loadReport);

  let currentRows = [];
  async function loadReport() {
    $('emptyState').textContent = 'กำลังโหลด...'; $('emptyState').style.display = 'block';
    $('tbody').innerHTML = ''; $('summary').style.display = 'none';
    const filters = {};
    if ($('subjectSel').value) filters.subjectId = $('subjectSel').value;
    if ($('assignmentSel').value) filters.assignmentId = $('assignmentSel').value;
    try {
      const r = await api('getReport', { filters: filters });
      if (!r || !r.ok) { $('emptyState').textContent = (r && r.error) || 'โหลดข้อมูลไม่สำเร็จ'; return; }
      currentRows = r.rows || [];
      render(currentRows);
    } catch (e) { $('emptyState').textContent = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'; }
  }

  function render(rows) {
    const body = $('tbody'); body.innerHTML = '';
    const has = rows.length > 0;
    $('csvBtn').disabled = !has; $('printBtn').disabled = !has;
    if (!has) { $('emptyState').textContent = 'ไม่มีข้อมูลการส่งงานตามเงื่อนไขที่เลือก'; $('emptyState').style.display = 'block'; $('summary').style.display = 'none'; return; }
    $('emptyState').style.display = 'none';

    let late = 0, reviewed = 0;
    rows.forEach(function (r) {
      if (r.timeliness === 'สาย') late++;
      if (r.status === 'ตรวจแล้ว') reviewed++;
      const tl = r.timeliness === 'สาย' ? '<span class="pill p-late">สาย</span>' : '<span class="pill p-ok">ตรงเวลา</span>';
      const st = r.status === 'ตรวจแล้ว' ? '<span class="pill p-ck">ตรวจแล้ว</span>' : '<span class="pill p-ok">ส่งแล้ว</span>';
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + escapeHtml(r.subjectName) + '</td><td>' + escapeHtml(r.roomLabel) + '</td><td>' + escapeHtml(r.title) + '</td>' +
        '<td>' + escapeHtml(r.seatNo) + '</td><td>' + escapeHtml(r.studentName) + '</td>' +
        '<td>' + escapeHtml(String(r.submittedAt || '')) + '</td><td>' + tl + '</td><td>' + st + '</td>';
      body.appendChild(tr);
    });

    $('summary').style.display = 'flex';
    $('summary').innerHTML =
      '<div class="chip"><b>' + rows.length + '</b>รายการส่ง</div>' +
      '<div class="chip"><b>' + (rows.length - late) + '</b>ตรงเวลา</div>' +
      '<div class="chip"><b>' + late + '</b>ส่งสาย</div>' +
      '<div class="chip"><b>' + reviewed + '</b>ตรวจแล้ว</div>';
  }

  // ---- ส่งออก Excel (CSV + BOM ให้ภาษาไทยไม่เพี้ยน) ----
  $('csvBtn').addEventListener('click', function () {
    if (!currentRows.length) return;
    const headers = ['วิชา', 'ห้อง', 'งาน', 'เลขที่', 'ชื่อ-สกุล', 'เวลาที่ส่ง', 'ความตรงเวลา', 'สถานะ'];
    const lines = [headers.map(csvCell).join(',')];
    currentRows.forEach(function (r) {
      lines.push([r.subjectName, r.roomLabel, r.title, r.seatNo, r.studentName, r.submittedAt, r.timeliness, r.status].map(csvCell).join(','));
    });
    const blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'รายงานการส่งงาน_' + stamp() + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
  function csvCell(v) { const s = String(v == null ? '' : v); return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }
  function stamp() { const d = new Date(); return d.getFullYear() + ('0' + (d.getMonth() + 1)).slice(-2) + ('0' + d.getDate()).slice(-2); }

  // ---- พิมพ์ PDF ----
  $('printBtn').addEventListener('click', function () {
    const sub = $('subjectSel').selectedOptions[0] ? $('subjectSel').selectedOptions[0].textContent : 'ทุกวิชา';
    $('printTitle').textContent = 'รายงานการส่งงาน · ' + schoolName + ' · ' + (sub || 'ทุกวิชา');
    window.print();
  });
</script>

<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  function countUp(el){
    if(reduce || el.getAttribute('data-bl-done')) return;
    var m = String(el.textContent).trim().match(/^(\d+)(%?)$/);
    if(!m) return;
    var target = +m[1], suf = m[2];
    el.setAttribute('data-bl-done','1');
    if(target === 0){ el.textContent = '0'+suf; return; }
    var dur=850, start=performance.now();
    function tick(now){var p=Math.min(1,(now-start)/dur);var e=1-Math.pow(1-p,3);el.textContent=Math.round(target*e)+suf;if(p<1)requestAnimationFrame(tick);else el.textContent=target+suf;}
    requestAnimationFrame(tick);
  }
  function revealStagger(els, base, anim){
    if(reduce) return;
    var i=0;
    els.forEach(function(el){
      if(el.getAttribute('data-bl-rev')) return;
      el.setAttribute('data-bl-rev','1');
      el.style.animation=(anim||'blrise')+' .5s cubic-bezier(.22,.61,.36,1) both';
      el.style.animationDelay=((base||0)+Math.min(i,10)*0.045)+'s';
      i++;
    });
  }
  function sweep(){
    document.querySelectorAll('.chip b, .num').forEach(countUp);
    revealStagger([].slice.call(document.querySelectorAll('.metric, .chip')),0,'blrise');
    revealStagger([].slice.call(document.querySelectorAll('.card, .panel, .login-card')),0.05,'blrise');
    revealStagger([].slice.call(document.querySelectorAll('.item, .qrcard')),0.1,'blrise');
    revealStagger([].slice.call(document.querySelectorAll('#tbody tr, #rosterBody tr, .recent li')),0.04,'blfade');
  }
  function start(){
    sweep();
    var mo = new MutationObserver(function(){ sweep(); });
    mo.observe(document.body, {childList:true, subtree:true});
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', start); else start();
})();
</script>
</body>
</html>
