<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ · ระบบส่งงานบ้านละลม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ====== ตั้งค่า API_URL: วาง URL /exec ของ Web App (Code.gs) ที่ deploy แล้วตรงนี้ ====== */
  :root{
    --green:#5E9A2D; --green-d:#2F5511; --green-l:#EFF4E4;
    --yellow:#F7C948; --yellow-d:#6B4D06;
    --bg:#F4F8EC; --ink:#33421C; --muted:#6E7B56; --line:#D2DEBC; --white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;
    background:
      radial-gradient(900px 500px at 15% -10%, #E4F0CE 0%, transparent 55%),
      radial-gradient(800px 600px at 110% 110%, #DCEFC4 0%, transparent 50%),
      var(--bg);
  }
  .card{
    width:100%;max-width:360px;background:var(--white);border:0.5px solid var(--line);
    border-radius:18px;padding:30px 26px;text-align:center;
    box-shadow:0 18px 50px -22px rgba(47,85,17,.35);
    animation:rise .5s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .logo{
    width:64px;height:64px;border-radius:50%;background:var(--green-l);color:var(--green);
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px;overflow:hidden;
    font-size:30px;font-weight:700;border:0.5px solid var(--line);
  }
  .logo img{width:100%;height:100%;object-fit:contain}
  h1{font-size:20px;font-weight:600;color:var(--green-d)}
  .sub{font-size:13px;color:var(--muted);margin-top:3px}
  form{margin-top:20px;text-align:left}
  label{display:block;font-size:13px;color:#4A5A2C;margin:13px 0 5px}
  input{
    width:100%;height:44px;border:0.5px solid #CBD9B0;border-radius:10px;padding:0 13px;
    font-size:15px;font-family:inherit;color:var(--ink);background:#fff;transition:border-color .15s, box-shadow .15s;
  }
  input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(94,154,45,.2)}
  .pw-wrap{position:relative}
  .pw-wrap input{padding-right:46px}
  .pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:19px}
  .pw-toggle:hover{color:var(--green);background:var(--green-l)}
  .back-public{display:inline-flex;align-items:center;gap:6px;margin-top:16px;font-size:13px;color:var(--green);text-decoration:none;padding:8px 14px;border-radius:9px;transition:background .15s}
  .back-public:hover{background:var(--green-l)}
  .back-public i{font-size:16px}
  .btn{
    width:100%;height:46px;margin-top:20px;border:none;border-radius:10px;
    background:var(--green);color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;transition:filter .15s, transform .05s;
  }
  .btn:hover{filter:brightness(1.06)} .btn:active{transform:scale(.99)}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .spin{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:none}
  @keyframes sp{to{transform:rotate(360deg)}}
  .msg{margin-top:14px;font-size:13px;border-radius:9px;padding:9px 12px;display:none;text-align:center}
  .msg.err{display:block;background:#FBE2E2;color:#9B2C2C}
  .hint{font-size:12px;color:var(--muted);margin-top:14px}
  footer{margin-top:22px;font-size:12px;color:var(--muted);text-align:center;line-height:1.7}
  footer b{color:var(--green-d);font-weight:600}

  @keyframes blrise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes blfade{from{opacity:0}to{opacity:1}}
  @media(prefers-reduced-motion:reduce){[data-bl-rev]{animation:none!important}}
</style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.21.0/tabler-icons.min.css">
</head>
<body>
  <div class="card">
    <div class="logo" id="logo">โล</div>
    <h1>เข้าสู่ระบบ</h1>
    <div class="sub" id="schoolName">โรงเรียนบ้านละลม</div>
    <form id="loginForm" autocomplete="on">
      <label for="username">ชื่อผู้ใช้</label>
      <input id="username" name="username" type="text" placeholder="กรอกชื่อผู้ใช้" required>
      <label for="password">รหัสผ่าน</label>
      <div class="pw-wrap">
        <input id="password" name="password" type="password" placeholder="กรอกรหัสผ่าน" required>
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="แสดงรหัสผ่าน"><i class="ti ti-eye" aria-hidden="true"></i></button>
      </div>
      <button class="btn" id="submitBtn" type="submit">
        <span class="spin" id="spin"></span><i class="ti ti-login-2" id="btnIcon" aria-hidden="true"></i><span id="btnText">เข้าสู่ระบบ</span>
      </button>
      <div class="msg err" id="errMsg"></div>
      <div class="hint">สำหรับครูผู้สอนและผู้ดูแลระบบ · ลืมรหัสผ่านติดต่อผู้ดูแล</div>
    </form>
    <a class="back-public" href="dashboard.html"><i class="ti ti-arrow-left" aria-hidden="true"></i> กลับหน้าสาธารณะ</a>
  </div>
  <footer>ผู้พัฒนา: <b>นายชิติพัทธ์ นิลวรรณ</b><br>ครูโรงเรียนบ้านละลม สพป.ศรีสะเกษ เขต 3</footer>

<script>
  // ====== วาง URL /exec ของ Web App ที่ deploy จาก Code.gs ตรงนี้ ======
  const API_URL = 'https://script.google.com/macros/s/AKfycbwCTrn5F2tZ-UJiBazA1PA2np5Lwwhy_TYYie7liGg9LFIcaavqF78PLiPqaC3TwyXt/exec';

  async function api(action, payload) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action }, payload || {}))
    });
    return res.json();
  }

  // ถ้าล็อกอินอยู่แล้ว ข้ามไปหน้าสแกน
  if (sessionStorage.getItem('bl_token')) {
    location.replace('scan.html');
  }

  // โหลดชื่อ/โลโก้โรงเรียนมาแสดง
  (async function loadConfig() {
    try {
      const c = await api('getConfig');
      if (c && c.ok) {
        if (c.schoolName) document.getElementById('schoolName').textContent = c.schoolName;
        if (c.logoUrl) {
          const img = document.createElement('img');
          img.src = c.logoUrl; img.alt = 'โลโก้โรงเรียน';
          const box = document.getElementById('logo');
          box.textContent = ''; box.appendChild(img);
        }
      }
    } catch (e) { /* ไม่มี config ก็ใช้ค่าเริ่มต้นบนหน้า */ }
  })();

  const form = document.getElementById('loginForm');
  const errMsg = document.getElementById('errMsg');
  const btn = document.getElementById('submitBtn');
  const spin = document.getElementById('spin');
  const btnText = document.getElementById('btnText');

  function setLoading(on) {
    btn.disabled = on;
    spin.style.display = on ? 'inline-block' : 'none';
    btnText.textContent = on ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ';
  }
  function showError(text) { errMsg.textContent = text; errMsg.style.display = 'block'; }

  // ปุ่มเปิด-ปิดรหัสผ่าน
  var pwToggle = document.getElementById('pwToggle');
  if (pwToggle) {
    pwToggle.addEventListener('click', function () {
      var inp = document.getElementById('password');
      var icon = pwToggle.querySelector('i');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'ti ti-eye-off';
        pwToggle.setAttribute('aria-label', 'ซ่อนรหัสผ่าน');
      } else {
        inp.type = 'password';
        icon.className = 'ti ti-eye';
        pwToggle.setAttribute('aria-label', 'แสดงรหัสผ่าน');
      }
      inp.focus();
    });
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    errMsg.style.display = 'none';
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showError('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'); return; }
    if (API_URL.indexOf('PASTE_YOUR') === 0) { showError('ยังไม่ได้ตั้งค่า API_URL ในไฟล์'); return; }

    setLoading(true);
    try {
      const r = await api('login', { username: username, password: password });
      if (r && r.ok) {
        sessionStorage.setItem('bl_token', r.token);
        sessionStorage.setItem('bl_session', JSON.stringify(r.session));
        location.href = 'scan.html';
      } else {
        showError((r && r.error) || 'เข้าสู่ระบบไม่สำเร็จ');
        setLoading(false);
      }
    } catch (err) {
      showError('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ ตรวจสอบ API_URL และอินเทอร์เน็ต');
      setLoading(false);
    }
  });
</script>

<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  function countUp(el){
    if(reduce || el.getAttribute('data-bl-done')) return;
    var m = String(el.textContent).trim().match(/^(\d+)(%?)$/);
    if(!m) return;
    var target = +m[1], suf = m[2];
    el.setAttribute('data-bl-done','1');
    if(target === 0){ el.textContent = '0'+suf; return; }
    var dur=850, start=performance.now();
    function tick(now){var p=Math.min(1,(now-start)/dur);var e=1-Math.pow(1-p,3);el.textContent=Math.round(target*e)+suf;if(p<1)requestAnimationFrame(tick);else el.textContent=target+suf;}
    requestAnimationFrame(tick);
  }
  function revealStagger(els, base, anim){
    if(reduce) return;
    var i=0;
    els.forEach(function(el){
      if(el.getAttribute('data-bl-rev')) return;
      el.setAttribute('data-bl-rev','1');
      el.style.animation=(anim||'blrise')+' .5s cubic-bezier(.22,.61,.36,1) both';
      el.style.animationDelay=((base||0)+Math.min(i,10)*0.045)+'s';
      i++;
    });
  }
  function sweep(){
    document.querySelectorAll('.chip b, .num').forEach(countUp);
    revealStagger([].slice.call(document.querySelectorAll('.metric, .chip')),0,'blrise');
    revealStagger([].slice.call(document.querySelectorAll('.card, .panel, .login-card')),0.05,'blrise');
    revealStagger([].slice.call(document.querySelectorAll('.item, .qrcard')),0.1,'blrise');
    revealStagger([].slice.call(document.querySelectorAll('#tbody tr, #rosterBody tr, .recent li')),0.04,'blfade');
  }
  function start(){
    sweep();
    var mo = new MutationObserver(function(){ sweep(); });
    mo.observe(document.body, {childList:true, subtree:true});
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', start); else start();
})();
</script>
</body>
</html>
